<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo negro -->
  <rect width="512" height="512" rx="80" fill="#0a0a0a"/>

  <!-- Gorro de chef (blanco) -->
  <!-- Base del gorro -->
  <rect x="146" y="272" width="220" height="44" rx="10" fill="#f5f5f5"/>
  <!-- Cuerpo del gorro -->
  <ellipse cx="256" cy="230" rx="104" ry="76" fill="#f5f5f5"/>
  <!-- Pompón superior -->
  <circle cx="256" cy="162" r="50" fill="#f5f5f5"/>

  <!-- Signo $ dorado sobre el gorro -->
  <text x="256" y="270" font-family="Georgia, serif" font-size="80" font-weight="bold"
        fill="#f59e0b" text-anchor="middle" dominant-baseline="middle">$</text>

  <!-- Línea separadora dorada -->
  <rect x="120" y="334" width="272" height="3" rx="2" fill="#f59e0b" opacity="0.4"/>

  <!-- Texto "Chef Financiero" dorado -->
  <text x="256" y="388" font-family="Arial, sans-serif" font-size="44" font-weight="bold"
        fill="#f59e0b" text-anchor="middle">Chef</text>
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="38" font-weight="300"
        fill="#f59e0b" text-anchor="middle" letter-spacing="2">Financiero</text>
</svg>
