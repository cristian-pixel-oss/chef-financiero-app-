<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fondo negro -->
  <rect width="192" height="192" rx="32" fill="#0a0a0a"/>

  <!-- Gorro de chef (blanco) -->
  <!-- Base del gorro -->
  <rect x="56" y="104" width="80" height="16" rx="4" fill="#f5f5f5"/>
  <!-- Cuerpo del gorro -->
  <ellipse cx="96" cy="88" rx="38" ry="28" fill="#f5f5f5"/>
  <!-- Pompón superior -->
  <circle cx="96" cy="62" r="18" fill="#f5f5f5"/>

  <!-- Signo $ dorado sobre el gorro -->
  <text x="96" y="100" font-family="Georgia, serif" font-size="28" font-weight="bold"
        fill="#f59e0b" text-anchor="middle" dominant-baseline="middle">$</text>

  <!-- Texto "CF" dorado debajo -->
  <text x="96" y="148" font-family="Arial, sans-serif" font-size="22" font-weight="bold"
        fill="#f59e0b" text-anchor="middle" letter-spacing="4">CF</text>
</svg>
